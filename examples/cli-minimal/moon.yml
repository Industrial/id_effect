# https://moonrepo.dev/docs/config/project
language: 'rust'
layer: 'library'
tasks:
  check:
    deps: ['effect:ci-format', '^:check']
    command:
      - cargo
      - check
      - -p
      - cli_minimal
      - --all-targets
      - --all-features
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  clippy:
    deps: ['^:clippy', '~:check']
    command:
      - cargo
      - clippy
      - -p
      - cli_minimal
      - --all-targets
      - --all-features
      - --
      - -D
      - warnings
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  test:
    deps: ['^:test', '~:clippy']
    command:
      - cargo
      - nextest
      - run
      - -p
      - cli_minimal
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  build:
    deps: ['^:build', '~:test']
    command:
      - cargo
      - build
      - -p
      - cli_minimal
      - --all-targets
      - --all-features
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
