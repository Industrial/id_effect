# Root-level workspace tasks
# https://moonrepo.dev/docs/config/project
id: 'effect'
language: 'rust'
layer: 'application'
workspace:
  inheritedTasks:
    exclude:
      - check
      - clippy
      - test
tasks:
  format:
    description: 'Format the workspace with treefmt (Rust, Nix, shell, JS/TS, YAML, TOML)'
    command: 'bash'
    args: ['scripts/treefmt-moon.sh']
    inputs:
      - 'treefmt.toml'
      - '**/*.rs'
      - '**/*.nix'
      - '**/*.sh'
      - '**/*.{js,jsx,ts,tsx,json}'
      - '**/*.{yml,yaml}'
      - '**/*.toml'
      - '.github/workflows/*.yml'
      # Cargo/moon scratch — must not salt task hashes (esp. target/.rustc_info.json).
      - '!target/**/*'
      - '!**/.moon/cache/**/*'
      - '!**/node_modules/**/*'
    options:
      cache: false
      outputStyle: buffer-only-failure
  ci-format:
    description: >-
      Repo-wide format *check* (treefmt CI mode + fail-on-change). Always runs (never cached): package :check/:clippy/:test/:build depend on it. Use :format to write formatted files.
    command: 'bash'
    args: ['scripts/treefmt-moon.sh', '--ci', '--config-file', 'treefmt.ci.toml']
    inputs:
      - 'treefmt.ci.toml'
      - '**/*.rs'
      - '**/*.nix'
      - '**/*.sh'
      - '**/*.{js,jsx,ts,tsx,json}'
      - '**/*.{yml,yaml}'
      - '**/*.toml'
      - '.github/workflows/*.yml'
      # Exclude build artifacts from the hash so dependents stay cacheable while
      # this task itself remains uncached (options.cache: false).
      - '!target/**/*'
      - '!**/.moon/cache/**/*'
      - '!**/node_modules/**/*'
    options:
      cache: false
      outputStyle: buffer-only-failure
  audit:
    description: 'Run cargo audit for known Rust security advisories'
    command: 'cargo'
    args: ['audit']
    inputs:
      - '.cargo/audit.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
    options:
      cache: false
      outputStyle: buffer-only-failure
  parity-checklist:
    description: 'Validate Effect.ts upstream parity checklist and UPSTREAM-VERSION pin'
    command: 'bash'
    args: ['scripts/parity-checklist.sh']
    inputs:
      - 'scripts/parity-checklist.sh'
      - 'docs/effect-ts-parity/CHECKLIST-upstream-effect.md'
      - 'docs/effect-ts-parity/UPSTREAM-VERSION'
    options:
      cache: true
      outputStyle: buffer-only-failure
  coverage:
    description: >-
      Full workspace: cargo llvm-cov nextest with 95% lines/regions/functions. Excludes paths that cannot be unit-tested (CLI main, proc-macro entry stubs, generator scaffolding, event-store bridge, streaming spawn glue, logger pipeline, foundation coproduct/never, schema parse combinator surface).
    command: 'bash'
    args: ['scripts/llvm-cov-nextest.sh']
    deps: ['~:ci-format']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/*.rs'
      - 'scripts/llvm-cov-nextest.sh'
    options:
      cache: false
  build:
    description: 'Build the workspace with cargo'
    deps: ['~:ci-format', '^:build']
    command: 'cargo'
    args: ['build']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  docs:
    description: 'Build Rust API documentation with cargo doc'
    command: 'cargo'
    args: ['doc', '--no-deps', '--workspace']
    env:
      RUSTDOCFLAGS: ''
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/*.rs'
    outputs:
      - 'target/doc'
    options:
      cache: true
      outputStyle: buffer-only-failure
  book:
    description: 'Build the Effect.rs mdBook HTML documentation'
    command: 'mdbook'
    args: ['build', 'crates/id_effect/book']
    inputs:
      - 'crates/id_effect/book/book.toml'
      - 'crates/id_effect/book/src/**/*'
    outputs:
      - 'crates/id_effect/book/book'
    options:
      cache: true
      outputStyle: buffer-only-failure
  fix:
    description: 'Auto-fix with cargo fix and clippy --fix'
    command: 'bash'
    args: ['-c', 'cargo fix --allow-dirty --allow-staged --workspace --all-features && cargo clippy --fix --allow-dirty --allow-staged --workspace --all-features -- -D warnings']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/*.rs'
    options:
      cache: false
      outputStyle: buffer-only-failure
  bench:
    description: 'Run benchmarks (no-op if no benches)'
    command: 'bash'
    args: ['-c', 'if [ -d benches ]; then cargo bench; else echo "No benches/ directory"; fi']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/*.rs'
      - 'benches/**/*'
    options:
      cache: false
      outputStyle: buffer-only-failure
  check-docs:
    description: 'Build docs and run clippy with -D warnings (public API docs via rustc lints)'
    command: 'bash'
    args: ['-c', 'RUSTDOCFLAGS="" cargo doc --workspace --no-deps 2>&1 | tee log/docs-warnings.log | grep -E "(warning|error|Documenting|Finished)"']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/*.rs'
    options:
      cache: false
      outputStyle: buffer-only-failure
