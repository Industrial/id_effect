# Root-level workspace tasks
# https://moonrepo.dev/docs/config/project
id: 'effect'
language: 'rust'
layer: 'application'
workspace:
  inheritedTasks:
    exclude:
      - check
      - clippy
      - test
tasks:
  format:
    description: 'Format the workspace with treefmt (Rust, Nix, shell, JS/TS, YAML, TOML)'
    command: 'treefmt'
    inputs:
      - 'treefmt.toml'
      - '**/*.rs'
      - '**/*.nix'
      - '**/*.sh'
      - '**/*.{js,jsx,ts,tsx,json}'
      - '**/*.{yml,yaml}'
      - '**/*.toml'
      - '.github/workflows/*.yml'
    options:
      cache: false
      outputStyle: buffer-only-failure
  ci-format:
    description: 'Format check for CI (treefmt with fail-on-change)'
    command: 'treefmt'
    args: ['--config-file', 'treefmt.ci.toml']
    inputs:
      - 'treefmt.ci.toml'
      - '**/*.rs'
      - '**/*.nix'
      - '**/*.sh'
      - '**/*.{js,jsx,ts,tsx,json}'
      - '**/*.{yml,yaml}'
      - '**/*.toml'
      - '.github/workflows/*.yml'
    options:
      cache: false
      outputStyle: buffer-only-failure
  clippy:
    description: 'Gate after format: member crates have run clippy (anchor for workspace lint ~:clippy)'
    deps: ['~:format', '^:clippy']
    command: 'bash'
    args: ['-c', ':']
    options:
      cache: true
      outputStyle: buffer-only-failure
  audit:
    description: 'Run cargo audit for known Rust security advisories'
    command: 'cargo'
    args: ['audit']
    inputs:
      - '.cargo/audit.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
    options:
      cache: false
      outputStyle: buffer-only-failure
  coverage:
    description: >-
      Full workspace: cargo llvm-cov nextest with 95% lines/regions/functions (no path excludes).
    command: 'cargo'
    args:
      - 'llvm-cov'
      - 'nextest'
      - '--fail-under-lines'
      - '95'
      - '--fail-under-regions'
      - '95'
      - '--fail-under-functions'
      - '95'
    deps: ['~:format']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/*.rs'
    options:
      cache: false
  test:
    description: 'Gate: member crates have run tests (anchor for workspace ~:test)'
    deps: ['^:test']
    command: 'bash'
    args: ['-c', ':']
    options:
      cache: true
      outputStyle: buffer-only-failure
  build:
    description: 'Build the workspace with cargo'
    deps: ['^:build', '~:test']
    command: 'cargo'
    args: ['build']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  docs:
    description: 'Build Rust API documentation with cargo doc'
    command: 'cargo'
    args: ['doc', '--no-deps', '--all-features']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/*.rs'
    outputs:
      - 'target/doc'
    options:
      cache: true
      outputStyle: buffer-only-failure
  book:
    description: 'Build the Effect.rs mdBook HTML documentation'
    command: 'mdbook'
    args: ['build', 'crates/effect_rs/book']
    inputs:
      - 'crates/effect_rs/book/book.toml'
      - 'crates/effect_rs/book/src/**/*'
    outputs:
      - 'crates/effect_rs/book/book'
    options:
      cache: true
      outputStyle: buffer-only-failure
  fix:
    description: 'Auto-fix with cargo fix and clippy --fix'
    command: 'bash'
    args: ['-c', 'cargo fix --allow-dirty --allow-staged --workspace --all-features && cargo clippy --fix --allow-dirty --allow-staged --workspace --all-features -- -D warnings']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/*.rs'
    options:
      cache: false
      outputStyle: buffer-only-failure
  bench:
    description: 'Run benchmarks (no-op if no benches)'
    command: 'bash'
    args: ['-c', 'if [ -d benches ]; then cargo bench; else echo "No benches/ directory"; fi']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/*.rs'
      - 'benches/**/*'
    options:
      cache: false
      outputStyle: buffer-only-failure
  check-docs:
    description: 'Build docs and run clippy with -D warnings (public API docs via rustc lints)'
    command: 'bash'
    args: ['-c', 'RUSTDOCFLAGS="" cargo doc --all-features --no-deps 2>&1 | tee log/docs-warnings.log | grep -E "(warning|error|Documenting|Finished)"']
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/*.rs'
    options:
      cache: false
      outputStyle: buffer-only-failure
