name: Docs & Pages
# API docs + mdBook are validated in CI (moon run :docs / :book on PRs via moon-ci).
# This workflow builds the combined site and deploys to Pages from main only.
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false
env:
  CARGO_TERM_COLOR: always
  MDBOOK_VERSION: "0.4.43"
jobs:
  build:
    name: Build book + API docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
      - name: Install moon
        run: |
          curl -fsSL https://moonrepo.dev/install/moon.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL \
            "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Sync moon projects
        run: moon sync
        env:
          MOON_TOOLCHAIN_FORCE_GLOBALS: rust
      - name: Build API docs (cargo doc)
        run: moon run :docs
        env:
          MOON_TOOLCHAIN_FORCE_GLOBALS: rust
          RUSTDOCFLAGS: -D warnings
      - name: Build mdBook
        run: moon run :book
        env:
          MOON_TOOLCHAIN_FORCE_GLOBALS: rust
      - name: Assemble Pages site
        run: |
          mkdir -p site/api
          cp -r crates/id_effect/book/book/. site/
          cp -r target/doc/. site/api/
      - name: Upload Pages artefact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/
  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
