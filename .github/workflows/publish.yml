          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: .github/scripts/publish-crate.sh id_effect_platform
      - name: Wait for crates.io index
        run: sleep 20
      - name: Publish id_effect_resilience
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: .github/scripts/publish-crate.sh id_effect_resilience
      - name: Wait for crates.io index
        run: sleep 20
      - name: Publish id_effect_sql
