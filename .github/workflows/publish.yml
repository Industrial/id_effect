          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: .github/scripts/publish-crate.sh id_effect_cli
      - name: Wait for crates.io index
        run: sleep 20
      - name: Publish id_effect_events
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: .github/scripts/publish-crate.sh id_effect_events
      - name: Wait for crates.io index
        run: sleep 20
      - name: Publish id_effect_jobs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: .github/scripts/publish-crate.sh id_effect_jobs
      - name: Wait for crates.io index
        run: sleep 20
      - name: Publish id_effect_logger
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: .github/scripts/publish-crate.sh id_effect_logger
      - name: Wait for crates.io index
        run: sleep 20
      - name: Publish id_effect_optics
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: .github/scripts/publish-crate.sh id_effect_optics
      - name: Wait for crates.io index
        run: sleep 20
      - name: Publish id_effect_parse
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: .github/scripts/publish-crate.sh id_effect_parse
      - name: Wait for crates.io index
