name: Publish to crates.io
# Trigger: push a semver tag, e.g.  git tag v0.3.0 && git push --tags
# The tag must match the version in every publishable workspace Cargo.toml.
# Crates are published in strict dependency order so that crates.io index
# updates before downstream crates try to resolve them.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (pass --dry-run to cargo publish)"
        required: false
        default: "false"
        type: boolean
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
jobs:
  verify-versions:
    name: Verify Versions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Extract version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/v}"
          else
            TAG=$(grep -m1 '^version = ' crates/id_effect_proc_macro/Cargo.toml | sed 's/^version = "\(.*\)"/\1/')
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $TAG"
      - name: Check all crate versions match
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MISMATCH=0
          for toml in crates/id_effect_*/Cargo.toml; do
            CRATE=$(grep -m1 '^name = ' "$toml" | sed 's/^name = "\(.*\)"/\1/')
            if [ "$CRATE" = "id_effect_lint" ]; then
              continue
            fi
            CRATE_VER=$(grep -m1 '^version = ' "$toml" | sed 's/^version = "\(.*\)"/\1/')
            if [ "$CRATE_VER" != "$VERSION" ]; then
              echo "MISMATCH: $toml ($CRATE) has version $CRATE_VER, expected $VERSION"
              MISMATCH=1
            fi
          done
          CORE_VER=$(grep -m1 '^version = ' crates/id_effect/Cargo.toml | sed 's/^version = "\(.*\)"/\1/')
          if [ "$CORE_VER" != "$VERSION" ]; then
            echo "MISMATCH: crates/id_effect/Cargo.toml has version $CORE_VER, expected $VERSION"
            MISMATCH=1
          fi
          if [ "$MISMATCH" -eq 1 ]; then
            echo "Version mismatch detected — aborting publish."
            exit 1
          fi
          echo "All publishable crates at $VERSION"
  test:
    name: Pre-publish tests
    runs-on: ubuntu-latest
    needs: [verify-versions]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo nextest run
        env:
          NEXTEST_NO_TESTS: pass
        run: cargo nextest run --workspace
  publish-level-0:
    name: Publish level-0 (graph, macro, proc_macro)
    runs-on: ubuntu-latest
    needs: [test]
    environment: crates-io
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish id_effect_graph
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: .github/scripts/publish-crate.sh id_effect_graph
      - name: Wait for crates.io index
        run: sleep 20
      - name: Publish id_effect_macro
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: .github/scripts/publish-crate.sh id_effect_macro
      - name: Wait for crates.io index
        run: sleep 20
      - name: Publish id_effect_proc_macro
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: .github/scripts/publish-crate.sh id_effect_proc_macro
  publish-level-1:
    name: Publish level-1 (id_effect)
    runs-on: ubuntu-latest
    needs: [publish-level-0]
    environment: crates-io
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish id_effect
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: .github/scripts/publish-crate.sh id_effect
  publish-level-2:
    name: Publish level-2 (cli, events, jobs, ...)
    runs-on: ubuntu-latest
    needs: [publish-level-1]
    environment: crates-io
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
