name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NEXTEST_NO_TESTS: pass
jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Format check (cargo fmt only; full treefmt requires Nix/devenv)
  # ──────────────────────────────────────────────────────────────────────────
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
  # ──────────────────────────────────────────────────────────────────────────
  # 2. cargo check (all targets, all features)
  # ──────────────────────────────────────────────────────────────────────────
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --workspace --all-targets --all-features
  # ──────────────────────────────────────────────────────────────────────────
  # 3. Clippy (all targets, all features, deny warnings)
  # ──────────────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: [format, check]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
  # ──────────────────────────────────────────────────────────────────────────
  # 4. Tests (nextest; all workspace crates)
  # Note: Dylint custom lints run locally via devenv; skipped here because
  # they require the Fenix nightly toolchain from Nix.
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [clippy]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo nextest run
        run: cargo nextest run --workspace
  # ──────────────────────────────────────────────────────────────────────────
  # 5. Build (workspace, all targets, all features)
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --workspace --all-targets --all-features
  # ──────────────────────────────────────────────────────────────────────────
  # 6. Examples (run all numbered examples; requires the helper script)
  # ──────────────────────────────────────────────────────────────────────────
  examples:
    name: Examples
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: Run workspace examples
        run: bash scripts/moon-run-crate-examples.sh --workspace
  # ──────────────────────────────────────────────────────────────────────────
  # 7. Coverage (llvm-cov nextest; fail under 95% lines/regions/functions)
  # ──────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: Generate coverage (lcov)
        run: |
          cargo llvm-cov nextest \
            --workspace \
            --lcov \
            --output-path lcov.info \
            --fail-under-lines 95 \
            --fail-under-regions 95 \
            --fail-under-functions 95
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
  # ──────────────────────────────────────────────────────────────────────────
  # 8. Doc check (cargo doc, no warnings)
  # ──────────────────────────────────────────────────────────────────────────
  doc-check:
    name: Doc Check
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: cargo doc (deny warnings)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --no-deps
  # ──────────────────────────────────────────────────────────────────────────
  # 9. MSRV / cross-platform matrix (stable + beta; linux + macos + windows)
  # ──────────────────────────────────────────────────────────────────────────
  matrix:
    name: ${{ matrix.toolchain }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.toolchain }}-${{ matrix.os }}
      - name: cargo test
        run: cargo test --workspace --all-features
  # ──────────────────────────────────────────────────────────────────────────
  # 10. Minimal-versions check (ensure dep lower bounds are correct)
  # ──────────────────────────────────────────────────────────────────────────
  minimal-versions:
    name: Minimal Versions
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (nightly for -Z minimal-versions)
        uses: dtolnay/rust-toolchain@nightly
      - name: Install Rust (stable for build)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: Generate minimal versions lock
        run: cargo +nightly update -Z minimal-versions
      - name: cargo check (minimal versions, stable)
        run: cargo +stable check --workspace --all-features
  # ──────────────────────────────────────────────────────────────────────────
  # Required status check gate — all jobs must pass for merge
  # ──────────────────────────────────────────────────────────────────────────
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs:
      - format
      - check
      - clippy
      - test
      - build
      - examples
      - doc-check
      - matrix
      - minimal-versions
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          results='${{ toJSON(needs) }}'
          failed=$(echo "$results" | jq -r '
            to_entries[]
            | select(.value.result != "success" and .value.result != "skipped")
            | .key
          ')
          if [ -n "$failed" ]; then
            echo "Failed jobs: $failed"
            exit 1
          fi
          echo "All required jobs passed"
