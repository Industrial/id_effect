name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NEXTEST_NO_TESTS: pass
  MOON_TOOLCHAIN_FORCE_GLOBALS: rust
jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Moon pipeline: PRs = --affected + graph relations; main = full workspace
  # (treefmt stack required because every crate :check depends on effect:ci-format)
  # ──────────────────────────────────────────────────────────────────────────
  moon-ci:
    name: Moon CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Nix (formatters for treefmt)
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Install treefmt toolchain (nixpkgs)
        run: |
          nix profile install \
            nixpkgs#treefmt \
            nixpkgs#alejandra \
            nixpkgs#taplo \
            nixpkgs#deadnix \
            nixpkgs#actionlint \
            nixpkgs#beautysh \
            nixpkgs#yamlfmt
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Biome (treefmt formatter for JS/JSON)
        run: npm install -g @biomejs/biome
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Install moon
        run: |
          curl -fsSL https://moonrepo.dev/install/moon.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Fetch base ref (for affected diffs)
        run: git fetch origin "${{ github.base_ref || 'main' }}"
      - name: moon sync
        run: moon sync
      - name: Moon run (affected on PR, full on main)
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            moon run :ci-format :check :clippy :test :build :examples :docs \
              --affected \
              --include-relations \
              --base "origin/${{ github.base_ref }}" \
              --head HEAD
          else
            moon run :ci-format :check :clippy :test :build :examples :docs
          fi
  # ──────────────────────────────────────────────────────────────────────────
  # Workspace coverage (llvm-cov cannot be expressed per-crate easily; run full)
  # ──────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [moon-ci]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: Generate coverage (lcov)
        run: |
          cargo llvm-cov nextest \
            --workspace \
            --lcov \
            --output-path lcov.info \
            --fail-under-lines 95 \
            --fail-under-regions 95 \
            --fail-under-functions 95
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
  # ──────────────────────────────────────────────────────────────────────────
  # Cross-platform smoke: full workspace tests (not Moon-affected; OS/toolchain)
  # ──────────────────────────────────────────────────────────────────────────
  matrix:
    name: ${{ matrix.toolchain }} / ${{ matrix.os }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    needs: [moon-ci]
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.toolchain }}-${{ matrix.os }}
      - name: cargo test (workspace)
        run: cargo test --workspace --all-features
  # ──────────────────────────────────────────────────────────────────────────
  # Minimal-versions lock resolution (workspace-wide)
  # ──────────────────────────────────────────────────────────────────────────
  minimal-versions:
    name: Minimal Versions
    runs-on: ubuntu-latest
    needs: [moon-ci]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (nightly for -Z minimal-versions)
        uses: dtolnay/rust-toolchain@nightly
      - name: Install Rust (stable for build)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: Generate minimal versions lock
        run: cargo +nightly update -Z minimal-versions
      - name: cargo check (minimal versions, stable)
        run: cargo +stable check --workspace --all-features
  # ──────────────────────────────────────────────────────────────────────────
  # Required status check gate
  # ──────────────────────────────────────────────────────────────────────────
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs:
      - moon-ci
      - coverage
      - matrix
      - minimal-versions
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          results='${{ toJSON(needs) }}'
          failed=$(echo "$results" | jq -r '
            to_entries[]
            | select(.value.result != "success" and .value.result != "skipped")
            | .key
          ')
          if [ -n "$failed" ]; then
            echo "Failed jobs: $failed"
            exit 1
          fi
          echo "All required jobs passed"
