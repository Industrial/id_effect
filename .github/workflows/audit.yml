name: Security Audit
on:
  push:
    branches: [main]
    paths:
      - Cargo.lock
      - Cargo.toml
      - "**/Cargo.toml"
  pull_request:
    branches: [main]
    paths:
      - Cargo.lock
      - Cargo.toml
      - "**/Cargo.toml"
  schedule:
    # Run every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run cargo audit
        run: cargo audit
