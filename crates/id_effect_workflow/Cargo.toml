[package]
name = "id_effect_workflow"
version = "0.1.0"
edition = "2024"
description = "Experimental durable step log (SQLite) with resume semantics — Phase G spike for Effect.ts parity"
license = "CC-BY-SA-4.0"
repository = "https://github.com/Industrial/id_effect"
readme = "README.md"
keywords = ["effect", "workflow", "durable", "sqlite", "saga"]
categories = ["database"]

[lints.rust]
unsafe_code = "forbid"
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(coverage)'] }

[dependencies]
id_effect = { path = "../id_effect", version = "0.2.0" }
rayon = "1.12"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

[dev-dependencies]
rstest = "0.26"
tempfile = "3"
