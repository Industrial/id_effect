# https://moonrepo.dev/docs/config/project
language: 'rust'
layer: 'library'
tasks:
  check:
    deps: ['effect:ci-format', '^:check']
    command:
      - cargo
      - check
      - -p
      - id_effect_jobs
      - --all-targets
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  check-all-features:
    description: 'Check optional postgres/apalis/obix/kafka (requires DATABASE_URL)'
    deps: ['~:check']
    command:
      - cargo
      - check
      - -p
      - id_effect_jobs
      - --all-targets
      - --all-features
    options:
      cache: false
      outputStyle: buffer-only-failure
  clippy:
    deps: ['^:clippy', '~:check']
    command:
      - cargo
      - clippy
      - -p
      - id_effect_jobs
      - --all-targets
      - --
      - -D
      - warnings
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  test:
    deps: ['^:test', '~:clippy']
    command:
      - cargo
      - nextest
      - run
      - -p
      - id_effect_jobs
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
  build:
    deps: ['^:build', '~:test']
    command:
      - cargo
      - build
      - -p
      - id_effect_jobs
      - --all-targets
    inputs:
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
    options:
      cache: true
      outputStyle: buffer-only-failure
