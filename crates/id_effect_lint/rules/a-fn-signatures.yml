# ──────────────────────────────────────────────────────────────────────────────
# A-01  No async fn in Effect.rs code
# ──────────────────────────────────────────────────────────────────────────────
- id: id_effect-no-async-fn
  language: Rust
  severity: error
  message: |
    `async fn` is forbidden in Effect.rs code.
    Convert to `fn -> Effect<A, E, R>` and wrap async calls with `from_async`.
  note: |
    BAD:  async fn fetch(url: &str) -> String { … }
    GOOD: fn fetch(url: &str) -> Effect<String, FetchError, ()> {
              effect! { ~ from_async(|_| async move { … }) }
          }
  rule:
    pattern: async fn $NAME($$$PARAMS) $$$
  filters:
    - not:
        # Allow async fn main() and async fn *_test (tokio test entrypoints)
        any:
          - has:
              kind: attribute_item
              stopBy: neighbor
              pattern: "#[tokio::test]"
          - has:
              kind: attribute_item
              stopBy: neighbor
              pattern: "#[test]"
          - regex: "^main$"
            field: name
# ──────────────────────────────────────────────────────────────────────────────
# A-02  Public functions must not return Result<T, E>
# ──────────────────────────────────────────────────────────────────────────────
- id: id_effect-no-result-return-pub-fn
  language: Rust
  severity: error
  message: |
    Public functions must return `Effect<A, E, R>`, not `Result<T, E>`.
  note: |
    BAD:  pub fn parse(s: &str) -> Result<MyType, ParseError> { … }
    GOOD: pub fn parse(s: &str) -> Effect<MyType, ParseError, ()> { … }
  rule:
    all:
      - pattern: pub fn $NAME($$$) -> Result<$$$> { $$$BODY }
      - not:
          # Allow fn main() -> Result – it's the binary exit code
          regex: "^main$"
          field: name
# ──────────────────────────────────────────────────────────────────────────────
# A-03  Effect-returning functions must have a where clause
# ──────────────────────────────────────────────────────────────────────────────
- id: id_effect-effect-fn-requires-where-clause
  language: Rust
  severity: error
  message: |
    Effect-returning functions with generic parameters must have a `where` clause.
  note: |
    BAD:  fn build<A, E, R>(…) -> Effect<A, E, R> { … }
    GOOD: fn build<A, E, R>(…) -> Effect<A, E, R>
          where A: 'static, E: From<SvcError> + 'static, R: NeedsX + 'static
          { … }
  rule:
    all:
      - pattern: fn $NAME<$$$GENERICS>($$$) -> Effect<$$$> { $$$BODY }
      - not:
          pattern: fn $NAME<$$$GENERICS>($$$) -> Effect<$$$> where $$$PREDICATES { $$$BODY }
# ──────────────────────────────────────────────────────────────────────────────
# A-07  No `_effect` suffix on Effect-returning functions
# ──────────────────────────────────────────────────────────────────────────────
- id: id_effect-no-effect-suffix
  language: Rust
  severity: warning
  message: |
    Effect-returning functions must not have the `_effect` suffix.
    The return type already communicates effectfulness.
  note: |
    BAD:  fn fetch_user_effect(id: UserId) -> Effect<User, DbError, ()> { … }
    GOOD: fn fetch_user(id: UserId) -> Effect<User, DbError, ()> { … }
  rule:
    all:
      - pattern: fn $NAME($$$) -> Effect<$$$> { $$$BODY }
      - regex: "_effect$"
        field: name
# ──────────────────────────────────────────────────────────────────────────────
# A-08  `_blocking` suffix reserved for effect-running wrappers
# ──────────────────────────────────────────────────────────────────────────────
- id: id_effect-blocking-suffix-misuse
  language: Rust
  severity: warning
  message: |
    Functions named `*_blocking` that return `Effect<…>` are misleading.
    The `_blocking` suffix should only be used for functions that synchronously
    run an effect (calling `run_blocking` internally).
  note: |
    BAD:  fn save_blocking(r: Record) -> Effect<(), DbError, ()> { … }
    GOOD: fn save(r: Record) -> Effect<(), DbError, ()> { … }
          fn save_blocking(r: Record) -> Result<(), DbError> { run_blocking(save(r)) }
  rule:
    all:
      - pattern: fn $NAME($$$) -> Effect<$$$> { $$$BODY }
      - regex: "_blocking$"
        field: name
