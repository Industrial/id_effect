# ──────────────────────────────────────────────────────────────────────────────
# I-02  run_test result must not be .unwrap()-ed directly
# ──────────────────────────────────────────────────────────────────────────────
- id: id_effect-run-test-result-must-be-matched
  language: Rust
  severity: warning
  message: |
    `run_test(…).unwrap()` silently ignores fiber-leak and defect variants.
    Explicitly match `Exit::Success(_)` or use `run_test_and_unwrap`.
  note: |
    BAD:  let result = run_test(my_effect()).unwrap();
    GOOD: assert!(matches!(run_test(my_effect()), Exit::Success(_)));
          // or:
          let result = run_test_and_unwrap(my_effect());
  rule:
    pattern: run_test($$$).unwrap()
