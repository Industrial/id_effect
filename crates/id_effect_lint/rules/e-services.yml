# ──────────────────────────────────────────────────────────────────────────────
# E-02  No static service globals
# ──────────────────────────────────────────────────────────────────────────────
- id: effect-rs-no-static-service-globals
  language: Rust
  severity: error
  message: |
    `static` globals for service instances are forbidden.
    Services must be provided through the `R` type parameter at the program edge.
  note: |
    BAD:  static DB: Lazy<Arc<dyn Database>> = Lazy::new(|| Arc::new(PgDatabase::new()));
    GOOD: service_key!(DatabaseKey => dyn Database);
          // Inject at program edge: Layer::new(…).provide_as::<DatabaseKey>(db)
  rule:
    all:
      - pattern: "static $NAME: $TYPE = $INIT;"
      - not:
          # Allow simple primitive/string constants commonly used as constants.
          regex: "^(u8|u16|u32|u64|u128|usize|i8|i16|i32|i64|i128|isize|f32|f64|bool|char|&str|str)$"
          field: type
# ──────────────────────────────────────────────────────────────────────────────
# E-03  No thread_local! for request/fiber context
# ──────────────────────────────────────────────────────────────────────────────
- id: effect-rs-no-thread-local
  language: Rust
  severity: error
  message: |
    `thread_local!` storage leaks across fiber boundaries and hides dependencies.
    Use `FiberRef::new(initial_value)` for fiber-scoped dynamic state.
  note: |
    BAD:  thread_local! { static REQUEST_ID: Cell<Uuid> = Cell::new(Uuid::nil()); }
    GOOD: static REQUEST_ID: FiberRef<Uuid> = FiberRef::new(Uuid::nil);
  rule:
    pattern: thread_local! { $$$BODY }
# ──────────────────────────────────────────────────────────────────────────────
# E-04  .provide() must not be called inside library functions
# ──────────────────────────────────────────────────────────────────────────────
- id: effect-rs-provide-at-edge-not-in-library
  language: Rust
  severity: warning
  message: |
    `.provide(…)` called inside a library function.
    Dependency injection should happen at the program edge (`main` or tests),
    not buried inside implementation functions.
  note: |
    BAD:  fn get_user(id: Uuid) -> Effect<User, DbError, ()> {
              fetch_user(id).provide(default_db_layer())
          }
    GOOD: // In main: my_effect().provide(db_layer).provide(cache_layer)
  rule:
    all:
      - pattern: $RECV.provide($$$)
      - inside:
          kind: function_item
          stopBy: end
      - not:
          inside:
            kind: function_item
            has:
              kind: identifier
              regex: "^main$"
              field: name
      - not:
          inside:
            kind: function_item
            has:
              kind: attribute_item
              any:
                - pattern: "#[test]"
                - pattern: "#[tokio::test]"
