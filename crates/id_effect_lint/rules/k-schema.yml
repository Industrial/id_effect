# ──────────────────────────────────────────────────────────────────────────────
# K-01  Schema parsing must happen at IO boundaries
# ──────────────────────────────────────────────────────────────────────────────
- id: id_effect-schema-parsing-at-boundary
  language: Rust
  severity: warning
  message: |
    `serde_json::from_value(…).unwrap()` / `from_str(…).unwrap()` in domain code
    panics on bad input and skips the schema validation pipeline.
    Use `Unknown::from_serde_json(v)` + `Schema` at IO boundaries.
  note: |
    BAD:
      let record: MyRecord = serde_json::from_value(raw).unwrap();
    GOOD: (at the IO adapter layer)
      let unknown = Unknown::from_serde_json(raw)?;
      let record: MyRecord = MyRecordSchema.parse(unknown)?;
  rule:
    any:
      - pattern: serde_json::from_value($$$).unwrap()
      - pattern: serde_json::from_str($$$).unwrap()
      - pattern: serde_json::from_slice($$$).unwrap()
      - pattern: serde_json::from_value($$$).expect($MSG)
      - pattern: serde_json::from_str($$$).expect($MSG)
# ──────────────────────────────────────────────────────────────────────────────
# K-02  No raw serde derives on domain types exposed in public APIs
# ──────────────────────────────────────────────────────────────────────────────
- id: id_effect-prefer-schema-over-serde-derive
  language: Rust
  severity: warning
  message: |
    `#[derive(Deserialize)]` on a public domain type couples it to one
    serialization format. Define a `Schema` instead and keep domain types pure.
  note: |
    BAD:  #[derive(serde::Deserialize)] pub struct UserRecord { … }
    GOOD: pub struct UserRecord { … }
          // In the adapter layer:
          impl Schema for UserRecord { … }
  rule:
    all:
      - pattern: |
          #[derive($$$, Deserialize, $$$)]
          pub struct $NAME { $$$FIELDS }
      - not:
          # Allow in DTO / API boundary types (convention: *Dto, *Request, *Response)
          regex: "(Dto|Request|Response|Payload|Body)$"
          field: name
