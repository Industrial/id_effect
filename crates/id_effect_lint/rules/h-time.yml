# ──────────────────────────────────────────────────────────────────────────────
# H-01  No thread::sleep in domain code
# ──────────────────────────────────────────────────────────────────────────────
- id: effect-rs-no-thread-sleep-in-domain
  language: Rust
  severity: error
  message: |
    `std::thread::sleep` blocks the OS thread and starves the async runtime.
    Use `Schedule`-based retry/repeat combinators or the `Clock` service.
  note: |
    BAD:  thread::sleep(Duration::from_secs(5));
    GOOD: my_effect.retry(Schedule::spaced(Duration::from_secs(5)).take(3))
  rule:
    all:
      - any:
          - pattern: thread::sleep($$$)
          - pattern: std::thread::sleep($$$)
      - not:
          inside:
            kind: function_item
            has:
              kind: attribute_item
              any:
                - pattern: "#[test]"
                - pattern: "#[tokio::test]"
# ──────────────────────────────────────────────────────────────────────────────
# H-01b  No thread::sleep in tests (use run_test_with_clock)
# ──────────────────────────────────────────────────────────────────────────────
- id: effect-rs-no-thread-sleep-in-tests
  language: Rust
  severity: error
  message: |
    `thread::sleep` in a test function makes the suite slow and non-deterministic.
    Use `run_test_with_clock(effect, |clk| clk.advance(…))` for time travel.
  note: |
    BAD:  #[test] fn my_test() { thread::sleep(Duration::from_millis(500)); … }
    GOOD: #[test] fn my_test() {
              run_test_with_clock(my_effect(), |clk| clk.advance(Duration::from_millis(500)));
          }
  rule:
    all:
      - any:
          - pattern: thread::sleep($$$)
          - pattern: std::thread::sleep($$$)
      - inside:
          kind: function_item
          has:
            kind: attribute_item
            any:
              - pattern: "#[test]"
              - pattern: "#[tokio::test]"
# ──────────────────────────────────────────────────────────────────────────────
# H-02  No SystemTime::now() / Utc::now() in domain code
# ──────────────────────────────────────────────────────────────────────────────
- id: effect-rs-no-system-time-in-domain
  language: Rust
  severity: warning
  message: |
    Direct time access (`SystemTime::now()`, `Utc::now()`, `Instant::now()`) in
    domain code is not testable and creates hidden side effects.
    Inject time through the `Clock` service.
  note: |
    BAD:  let now = SystemTime::now();
    GOOD: fn fetch_expiry() -> Effect<DateTime, ClockError, impl NeedsClock> {
              effect! { let now = ~ ClockKey; … }
          }
  rule:
    any:
      - pattern: SystemTime::now()
      - pattern: Instant::now()
      - pattern: Utc::now()
      - pattern: Local::now()
      - pattern: chrono::Utc::now()
      - pattern: chrono::Local::now()
