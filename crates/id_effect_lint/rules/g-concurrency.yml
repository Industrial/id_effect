# ──────────────────────────────────────────────────────────────────────────────
# G-01  Fork result must be bound – not dropped
# ──────────────────────────────────────────────────────────────────────────────
- id: id_effect-fork-must-be-joined
  language: Rust
  severity: warning
  message: |
    `.fork()` result discarded – the spawned fiber is untracked and cannot be
    joined or interrupted.
  note: |
    BAD:  my_effect.fork();
    GOOD: let handle = my_effect.fork();
          // later: handle.join() or handle.interrupt()
  rule:
    all:
      - pattern: $EXPR.fork()
      - not:
          inside:
            kind: let_declaration
            stopBy: parent
# ──────────────────────────────────────────────────────────────────────────────
# G-03  No Arc<Mutex> / Arc<RwLock> for fiber coordination
# ──────────────────────────────────────────────────────────────────────────────
- id: id_effect-no-arc-mutex-for-fiber-coordination
  language: Rust
  severity: warning
  message: |
    `Arc<Mutex<…>>` / `Arc<RwLock<…>>` risk deadlocks across async fibers.
    Use `TRef` / `Stm` transactions or `SynchronizedRef` instead.
  note: |
    BAD:  let counter: Arc<Mutex<u64>> = Arc::new(Mutex::new(0));
    GOOD: let counter: TRef<u64> = TRef::new(0);
          // Inside STM: stm! { let n = ~ counter.get(); ~ counter.set(n + 1) }
  rule:
    any:
      - pattern: Arc<Mutex<$T>>
      - pattern: Arc<RwLock<$T>>
      - pattern: Arc::new(Mutex::new($INIT))
      - pattern: Arc::new(RwLock::new($INIT))
# ──────────────────────────────────────────────────────────────────────────────
# G-04  No Rc<RefCell> in Effect code
# ──────────────────────────────────────────────────────────────────────────────
- id: id_effect-no-rc-refcell
  language: Rust
  severity: error
  message: |
    `Rc<RefCell<…>>` is `!Send` and unsafe across fiber boundaries.
    Use `Ref` (single-fiber) or `SynchronizedRef` (shared) from the coordination module.
  note: |
    BAD:  let state: Rc<RefCell<State>> = Rc::new(RefCell::new(State::new()));
    GOOD: let state = Ref::new(State::new());
  rule:
    any:
      - pattern: Rc<RefCell<$T>>
      - pattern: Rc::new(RefCell::new($INIT))
