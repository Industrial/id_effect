# ──────────────────────────────────────────────────────────────────────────────
# C-01  No .await outside from_async
# ──────────────────────────────────────────────────────────────────────────────
- id: effect-rs-no-await-outside-from-async
  language: Rust
  severity: error
  message: |
    `.await` is only valid inside `async` blocks passed to `from_async`.
    Direct `.await` in Effect code means you are mixing runtimes.
  note: |
    BAD:
      fn fetch(url: &str) -> Effect<Bytes, IoError, ()> {
          effect! { let resp = reqwest::get(url).await?; … }
      }
    GOOD:
      fn fetch(url: &str) -> Effect<Bytes, IoError, ()> {
          effect! { let resp = ~ from_async(|_| async move { reqwest::get(url).await }); … }
      }
  rule:
    all:
      # Detect `expr.await` anywhere in a non-async fn body
      - pattern: $EXPR.await
      - inside:
          kind: function_item
          stopBy: end
      - not:
          inside:
            kind: async_block_expression
            stopBy: end
# ──────────────────────────────────────────────────────────────────────────────
# C-02  Prefer `?` over manual match in from_async bodies
# ──────────────────────────────────────────────────────────────────────────────
- id: effect-rs-prefer-question-mark-in-from-async
  language: Rust
  severity: warning
  message: |
    Manual `match { Ok(v) => v, Err(e) => return Err(e) }` inside `from_async`
    should be replaced with `?` operator.
  note: |
    BAD:
      from_async(|_| async move {
          let v = match op() { Ok(v) => v, Err(e) => return Err(e.into()) };
      })
    GOOD:
      from_async(|_| async move { let v = op()?; … })
  rule:
    all:
      - pattern: |
          match $EXPR {
              Ok($OK_VAR) => $OK_BODY,
              Err($ERR_VAR) => return Err($ERR_EXPR),
          }
      - inside:
          kind: async_block_expression
          stopBy: end
