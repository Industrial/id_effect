# ──────────────────────────────────────────────────────────────────────────────
# J-01  No println! / eprintln! in Effect-returning functions
# ──────────────────────────────────────────────────────────────────────────────
- id: effect-rs-no-println-in-effect
  language: Rust
  severity: warning
  message: |
    `println!` / `eprintln!` in Effect-returning code is an unstructured side
    effect that bypasses the effect channel and breaks testability.
  note: |
    BAD:
      fn load() -> Effect<Data, LoadError, ()> {
          effect! { println!("loading…"); … }
      }
    GOOD: use structured spans / tracing hooks:
      fn load() -> Effect<Data, LoadError, ()> {
          with_span("load", effect! { … })
      }
  rule:
    all:
      - any:
          - pattern: println!($$$)
          - pattern: eprintln!($$$)
          - pattern: print!($$$)
          - pattern: eprint!($$$)
      - inside:
          kind: function_item
          has:
            kind: type_identifier
            regex: "^Effect$"
          stopBy: end
      # Allow in tests
      - not:
          inside:
            kind: function_item
            has:
              kind: attribute_item
              any:
                - pattern: "#[test]"
                - pattern: "#[tokio::test]"
